name: Build YouTube streams index

on:
  workflow_dispatch:
    inputs:
      channel_handle:
        description: "YouTube 频道 handle（如 @dlw2023）"
        required: true
        default: "@dlw2023"
      channel_streams_url:
        description: "频道 Streams 完整 URL（留空则自动从 handle 拼接）"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: youtube-streams-index-${{ github.event.inputs.channel_handle }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Write cookies.txt (from secret)
        env:
          YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}
        run: |
          set -euo pipefail
          COOKIES_FILE="$RUNNER_TEMP/youtube_cookies.txt"
          printf '%s' "$YTDLP_COOKIES_TXT" > "$COOKIES_FILE"
          chmod 600 "$COOKIES_FILE"
          echo "COOKIES_FILE=$COOKIES_FILE" >> "$GITHUB_ENV"

      - name: Resolve channel streams URL
        env:
          CHANNEL_HANDLE: ${{ github.event.inputs.channel_handle }}
          CHANNEL_STREAMS_URL_INPUT: ${{ github.event.inputs.channel_streams_url }}
        run: |
          set -euo pipefail
          if [ -n "$CHANNEL_STREAMS_URL_INPUT" ]; then
            echo "CHANNEL_STREAMS_URL=$CHANNEL_STREAMS_URL_INPUT" >> "$GITHUB_ENV"
          else
            # 去掉 @ 前缀用于拼接 URL，保留原始 handle 用于显示
            HANDLE_CLEAN="${CHANNEL_HANDLE#@}"
            echo "CHANNEL_STREAMS_URL=https://www.youtube.com/@${HANDLE_CLEAN}/streams" >> "$GITHUB_ENV"
          fi
          # 将 handle 中的 @ 去掉，作为目录/文件名安全字符串
          HANDLE_SLUG="${CHANNEL_HANDLE#@}"
          echo "CHANNEL_SLUG=${HANDLE_SLUG}" >> "$GITHUB_ENV"
          echo "CHANNEL_HANDLE_DISPLAY=$CHANNEL_HANDLE" >> "$GITHUB_ENV"

      - name: Fetch streams list + classify
        env:
          CHANNEL_HANDLE_DISPLAY: ${{ env.CHANNEL_HANDLE_DISPLAY }}
          CHANNEL_SLUG: ${{ env.CHANNEL_SLUG }}
        run: |
          set -euo pipefail

          python - << 'PY'
          import csv, json, os, subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          channel_url      = os.environ["CHANNEL_STREAMS_URL"]
          cookies          = os.environ["COOKIES_FILE"]
          channel_slug     = os.environ["CHANNEL_SLUG"]          # e.g. dlw2023
          channel_display  = os.environ["CHANNEL_HANDLE_DISPLAY"] # e.g. @dlw2023

          outdir = Path(f"data/youtube/{channel_slug}")
          outdir.mkdir(parents=True, exist_ok=True)

          flat_path     = outdir / "streams_flat.json"
          raw_jsonl_path = outdir / "streams_raw.jsonl"
          csv_path      = outdir / "streams_index.csv"
          md_path       = outdir / "streams_index.md"
          summary_path  = outdir / "summary.json"

          # 1) 平铺拿到所有视频 ID
          flat_cmd = [
              "yt-dlp",
              "--cookies", cookies,
              "--flat-playlist",
              "-J",
              channel_url,
          ]
          flat_text = subprocess.check_output(flat_cmd, text=True)
          flat_path.write_text(flat_text, encoding="utf-8")

          flat    = json.loads(flat_text)
          entries = flat.get("entries") or []
          ids, seen = [], set()
          for e in entries:
              vid = (e or {}).get("id")
              if vid and vid not in seen:
                  seen.add(vid)
                  ids.append(vid)

          # 2) 逐视频抓详细元数据
          raw_lines = []
          for vid in ids:
              url = f"https://www.youtube.com/watch?v={vid}"
              cmd = [
                  "yt-dlp",
                  "--cookies", cookies,
                  "--skip-download",
                  "--ignore-no-formats-error",
                  "-j",
                  url,
              ]
              p = subprocess.run(cmd, capture_output=True, text=True)
              if p.returncode != 0 or not p.stdout.strip():
                  continue
              for line in p.stdout.splitlines():
                  line = line.strip()
                  if line.startswith("{") and line.endswith("}"):
                      raw_lines.append(line)

          raw_jsonl_path.write_text("\n".join(raw_lines) + ("\n" if raw_lines else ""), encoding="utf-8")

          def yyyymmdd_to_iso(s):
              if not s or len(s) != 8:
                  return ""
              return f"{s[0:4]}-{s[4:6]}-{s[6:8]}"

          rows = []
          for line in raw_lines:
              d            = json.loads(line)
              availability = d.get("availability") or ""
              members_only = (availability == "subscriber_only")
              upload_date  = d.get("upload_date") or d.get("release_date") or ""
              rows.append({
                  "id":           d.get("id") or "",
                  "title":        d.get("fulltitle") or d.get("title") or "",
                  "url":          d.get("webpage_url") or f"https://www.youtube.com/watch?v={d.get('id','')}",
                  "upload_date":  yyyymmdd_to_iso(upload_date),
                  "live_status":  d.get("live_status") or "",
                  "was_live":     bool(d.get("was_live")) if d.get("was_live") is not None else "",
                  "is_live":      bool(d.get("is_live"))  if d.get("is_live")  is not None else "",
                  "availability": availability,
                  "members_only": members_only,
              })

          rows.sort(key=lambda r: (r["upload_date"] or "0000-00-00", r["id"]), reverse=True)

          # 写 CSV
          fieldnames = ["id","title","url","upload_date","live_status","was_live","is_live","availability","members_only"]
          with csv_path.open("w", encoding="utf-8", newline="") as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(rows)

          # 写 Markdown（前 200 条）
          def md_escape(s):
              return (s or "").replace("|", "\\|").replace("\n", " ").strip()

          head     = rows[:200]
          now_utc  = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M:%S")
          md_lines = [
              f"# {channel_display} Streams Index\n",
              f"- Source: {channel_url}\n",
              f"- Updated (UTC): {now_utc}\n",
              f"- Total entries: {len(rows)}\n",
              "",
              "| Date | Members | Live status | Title | URL |",
              "|---|---:|---|---|---|",
          ]
          for r in head:
              md_lines.append(
                  f"| {r['upload_date'] or ''} | {'Y' if r['members_only'] else 'N'} "
                  f"| {md_escape(r['live_status'])} | {md_escape(r['title'])} | {md_escape(r['url'])} |"
              )
          md_path.write_text("\n".join(md_lines) + "\n", encoding="utf-8")

          # 写 summary
          summary = {
              "channel_handle":       channel_display,
              "channel_streams_url":  channel_url,
              "updated_utc":          datetime.now(timezone.utc).isoformat(),
              "total_entries":        len(rows),
              "members_only_count":   sum(1 for r in rows if r["members_only"]),
              "public_count":         sum(1 for r in rows if not r["members_only"]),
          }
          summary_path.write_text(json.dumps(summary, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          print(f"Done: {len(rows)} entries → {csv_path}, {md_path}, {raw_jsonl_path}, {summary_path}")
          PY

      - name: Commit & push changes
        env:
          CHANNEL_SLUG: ${{ env.CHANNEL_SLUG }}
          CHANNEL_HANDLE_DISPLAY: ${{ env.CHANNEL_HANDLE_DISPLAY }}
        run: |
          set -euo pipefail
          if git status --porcelain | grep -q '^'; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "data/youtube/${CHANNEL_SLUG}/"
            git commit -m "Update ${CHANNEL_HANDLE_DISPLAY} streams index" || exit 0
            git push
          else
            echo "No changes"
          fi
