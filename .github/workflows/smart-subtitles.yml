name: Smart Subtitles CN Stable

on:
  workflow_dispatch:
    inputs:
      url:
        description: "视频链接（B站/YouTube等）"
        required: true
        type: string
      langs:
        description: "优先字幕语言（逗号分隔/可正则）"
        required: false
        default: "zh.*,zh-CN,zh-Hans,cmn.*,.*orig"
        type: string
      whisper_model:
        description: "Whisper模型：tiny/base/small/medium/large"
        required: false
        default: "medium"
        type: string
      whisper_language:
        description: "Whisper识别语言（默认中文）"
        required: false
        default: "zh"
        type: string
      whisper_prompt:
        description: "Whisper初始提示词（建议简短，不要写成长说明）"
        required: false
        default: "简体中文字幕，使用中文标点。"
        type: string
      whisper_chunk_seconds:
        description: "音频切块秒数，例如 600/1200/3000"
        required: false
        default: "3600"
        type: string
      whisper_chunk_part:
        description: "只转写第几块；all=全部，1=第一块，2=第二块"
        required: false
        default: "1"
        type: string
      user_agent:
        description: "可选：浏览器UA"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  smart_subs:
    runs-on: ubuntu-latest
    env:
      YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: main

      - name: Setup Node.js (for yt-dlp JS challenges)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Setup Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yt-dlp openai-whisper

      - name: Cache Whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-models-${{ inputs.whisper_model }}
          restore-keys: |
            whisper-models-

      - name: Write cookies.txt (optional)
        if: ${{ env.YTDLP_COOKIES_TXT != '' }}
        shell: bash
        run: |
          printf '%s' "$YTDLP_COOKIES_TXT" | tr -d '\r' > cookies.txt

      - name: Prepare folders
        shell: bash
        run: |
          mkdir -p subs work

      - name: Resolve out_dir + Detect subtitle availability
        id: detect
        env:
          URL: ${{ inputs.url }}
          LANGS: ${{ inputs.langs }}
          UA: ${{ inputs.user_agent }}
        shell: bash
        run: python scripts/smart_subs/detect.py

      - name: Download existing subtitles into per-video folder
        if: steps.detect.outputs.mode == 'download'
        env:
          URL: ${{ inputs.url }}
          LANGS: ${{ inputs.langs }}
          UA: ${{ inputs.user_agent }}
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          set -euo pipefail
          UA_ARGS=()
          if [[ -n "${UA}" ]]; then UA_ARGS=(--user-agent "${UA}"); fi
          COOKIE_ARGS=()
          if [[ -f cookies.txt ]]; then COOKIE_ARGS=(--cookies cookies.txt); fi

          yt-dlp \
            --js-runtimes node --remote-components ejs:github \
            --skip-download \
            --write-subs --write-auto-subs \
            --sub-langs "${LANGS}" \
            --sub-format "vtt/best" \
            --convert-subs srt \
            -o "${OUT_DIR}/%(title).200s_%(id)s.%(ext)s" \
            "${COOKIE_ARGS[@]}" \
            "${UA_ARGS[@]}" \
            "${URL}"

      - name: Decide if Whisper is needed (fallback)
        id: postcheck
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          shopt -s nullglob
          files=("${OUT_DIR}"/*.srt "${OUT_DIR}"/*.vtt "${OUT_DIR}"/*.txt "${OUT_DIR}"/*.lrc)
          if [[ "${{ steps.detect.outputs.mode }}" == "whisper" ]]; then
            echo "need_whisper=true" >> "$GITHUB_OUTPUT"
          elif (( ${#files[@]} == 0 )); then
            echo "need_whisper=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_whisper=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download audio for Whisper
        if: steps.postcheck.outputs.need_whisper == 'true'
        env:
          URL: ${{ inputs.url }}
          UA: ${{ inputs.user_agent }}
        shell: bash
        run: |
          set -euo pipefail
          UA_ARGS=()
          if [[ -n "${UA}" ]]; then UA_ARGS=(--user-agent "${UA}"); fi
          COOKIE_ARGS=()
          if [[ -f cookies.txt ]]; then COOKIE_ARGS=(--cookies cookies.txt); fi

          yt-dlp \
            --js-runtimes node --remote-components ejs:github \
            -f "bestaudio/best" \
            -o "work/%(id)s.%(ext)s" \
            "${COOKIE_ARGS[@]}" \
            "${UA_ARGS[@]}" \
            "${URL}"

      - name: Whisper generate subtitles by custom chunks
        if: steps.postcheck.outputs.need_whisper == 'true'
        env:
          MODEL: ${{ inputs.whisper_model }}
          WHISPER_LANG: ${{ inputs.whisper_language }}
          WHISPER_PROMPT: ${{ inputs.whisper_prompt }}
          CHUNK_SECONDS: ${{ inputs.whisper_chunk_seconds }}
          CHUNK_PART: ${{ inputs.whisper_chunk_part }}
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          set -euo pipefail

          AUDIO_FILE="$(find work -maxdepth 1 -type f | head -n 1)"
          if [[ -z "${AUDIO_FILE}" ]]; then
            echo "No audio file found in work/"
            exit 1
          fi

          mkdir -p work/chunks "${OUT_DIR}/chunks"

          ffmpeg -y -i "${AUDIO_FILE}" \
            -vn -map 0:a:0 \
            -ac 1 -ar 16000 -c:a pcm_s16le \
            -f segment -segment_time "${CHUNK_SECONDS}" -reset_timestamps 1 \
            "work/chunks/part_%03d.wav"

          shopt -s nullglob
          files=(work/chunks/*.wav)

          if (( ${#files[@]} == 0 )); then
            echo "No chunk files generated."
            exit 1
          fi

          if [[ -n "${CHUNK_PART}" && "${CHUNK_PART}" != "all" ]]; then
            idx=$((10#${CHUNK_PART} - 1))
            if (( idx < 0 )); then
              echo "Invalid CHUNK_PART=${CHUNK_PART}"
              exit 1
            fi
            printf -v pick "work/chunks/part_%03d.wav" "${idx}"
            if [[ ! -f "${pick}" ]]; then
              echo "Chunk ${CHUNK_PART} not found: ${pick}"
              exit 1
            fi
            files=("${pick}")
          fi

          n=0
          for f in "${files[@]}"; do
            n=$((n + 1))
            echo "Transcribing $f"

            PROMPT_ARGS=()
            if [[ -n "${WHISPER_PROMPT}" && $n -eq 1 ]]; then
              PROMPT_ARGS=(--initial_prompt "${WHISPER_PROMPT}")
            fi

            whisper "$f" \
              --model "${MODEL}" \
              --language "${WHISPER_LANG}" \
              --task transcribe \
              --condition_on_previous_text False \
              --no_speech_threshold 0.2 \
              --temperature 0 \
              "${PROMPT_ARGS[@]}" \
              --output_dir "${OUT_DIR}/chunks" \
              --output_format all
          done

      - name: Convert SRT -> LRC (simple)
        if: steps.postcheck.outputs.need_whisper == 'true'
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: python scripts/smart_subs/srt_to_lrc.py

      - name: Extract plain text subtitles (no timestamps)
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: python scripts/smart_subs/extract_txt.py

      - name: Split large subtitle files (LRC + TXT, if > 40k bytes)
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: python scripts/smart_subs/split_chunks.py

      - name: Commit & push subtitles
        env:
          URL: ${{ inputs.url }}
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
          VIDEO_ID: ${{ steps.detect.outputs.video_id }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain subs)" ]]; then
            echo "No changes under subs/. Skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add subs
          git commit -m "Add subtitles CN stable: ${VIDEO_ID} (${URL})" || exit 0

          max_attempts=6
          attempt=1

          while (( attempt <= max_attempts )); do
            echo "Push attempt ${attempt}/${max_attempts}"

            if ! git pull --rebase origin main; then
              git rebase --abort || true
              echo "Rebase failed. Another run may have touched the same files."
              exit 1
            fi

            if git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed because remote main moved. Retrying..."
            sleep $(( attempt * 2 ))
            attempt=$(( attempt + 1 ))
          done

          echo "Push failed after ${max_attempts} attempts."
          exit 1
