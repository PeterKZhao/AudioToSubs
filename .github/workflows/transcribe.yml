name: Smart Subtitles (Commit Organized)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "视频链接（B站/YouTube等）"
        required: true
        type: string
      langs:
        description: "优先字幕语言（逗号分隔/可正则）"
        required: false
        default: "zh-Hans,zh-Hant,en.*"
        type: string
      whisper_model:
        description: "Whisper模型：tiny/base/small/medium/large"
        required: false
        default: "small"
        type: string
      whisper_language:
        description: "Whisper识别语言（留空自动检测）"
        required: false
        default: ""
        type: string
      user_agent:
        description: "可选：浏览器UA"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: smart-subtitles
  cancel-in-progress: false

jobs:
  smart_subs:
    runs-on: ubuntu-latest
    env:
      YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node.js (for yt-dlp JS challenges)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ffmpeg
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Setup Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U yt-dlp openai-whisper

      - name: Cache Whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-models-${{ inputs.whisper_model }}
          restore-keys: |
            whisper-models-

      - name: Write cookies.txt (optional)
        if: ${{ env.YTDLP_COOKIES_TXT != '' }}
        shell: bash
        run: |
          printf '%s' "$YTDLP_COOKIES_TXT" | tr -d '\r' > cookies.txt

      - name: Prepare folders
        shell: bash
        run: |
          mkdir -p subs work

      - name: Resolve out_dir + Detect subtitle availability
        id: detect
        env:
          URL: ${{ inputs.url }}
          LANGS: ${{ inputs.langs }}
          UA: ${{ inputs.user_agent }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os, re, subprocess
          from pathlib import Path

          url = os.environ["URL"].strip()
          langs = os.environ.get("LANGS","").strip()
          ua = os.environ.get("UA","").strip()
          patterns = [re.compile(x.strip()) for x in langs.split(",") if x.strip()]

          cmd = [
            "yt-dlp",
            "--js-runtimes", "node",
            "--remote-components", "ejs:github",
            "--skip-download",
            "--write-auto-subs",
            "-J",
            url,
          ]
          if os.path.exists("cookies.txt"):
            cmd += ["--cookies", "cookies.txt"]
          if ua:
            cmd += ["--user-agent", ua]

          info_text = subprocess.check_output(cmd, text=True)
          info = json.loads(info_text)

          extractor = info.get("extractor_key") or info.get("extractor") or "unknown"
          channel = info.get("channel_id") or info.get("uploader_id") or info.get("uploader") or "unknown"
          upload_date = info.get("upload_date") or info.get("release_date") or "unknown-date"
          vid = info.get("id") or "unknown-id"

          out_dir = Path("subs") / extractor / channel / f"{upload_date}_{vid}"
          out_dir.mkdir(parents=True, exist_ok=True)

          (out_dir / "source_url.txt").write_text(url + "\n", encoding="utf-8")
          (out_dir / "info.json").write_text(
            info_text + ("\n" if not info_text.endswith("\n") else ""),
            encoding="utf-8"
          )

          subs = info.get("subtitles") or {}
          auto = info.get("automatic_captions") or {}
          keys = sorted(set(list(subs.keys()) + list(auto.keys())))

          def ok(k):
            for r in patterns:
              if r.fullmatch(k) or r.search(k):
                return True
            return False

          matched = [k for k in keys if ok(k)]
          mode = "download" if matched else "whisper"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"mode={mode}\n")
            f.write("matched_langs=" + ",".join(matched) + "\n")
            f.write(f"out_dir={out_dir.as_posix()}\n")
            f.write(f"video_id={vid}\n")

          print("mode =", mode)
          print("out_dir =", out_dir)
          print("matched_langs =", ",".join(matched) if matched else "(none)")
          PY

      - name: Download existing subtitles into per-video folder
        if: steps.detect.outputs.mode == 'download'
        env:
          URL: ${{ inputs.url }}
          LANGS: ${{ inputs.langs }}
          UA: ${{ inputs.user_agent }}
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          set -euo pipefail
          UA_ARGS=()
          if [[ -n "${UA}" ]]; then UA_ARGS=(--user-agent "${UA}"); fi
          COOKIE_ARGS=()
          if [[ -f cookies.txt ]]; then COOKIE_ARGS=(--cookies cookies.txt); fi

          yt-dlp \
            --js-runtimes node --remote-components ejs:github \
            --skip-download \
            --write-subs --write-auto-subs \
            --sub-langs "${LANGS}" \
            --sub-format "vtt/best" \
            --convert-subs srt \
            -o "${OUT_DIR}/%(title).200s_%(id)s.%(ext)s" \
            "${URL}" \
            "${COOKIE_ARGS[@]}" \
            "${UA_ARGS[@]}"

      - name: Decide if Whisper is needed (fallback)
        id: postcheck
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          shopt -s nullglob
          files=("${OUT_DIR}"/*.srt "${OUT_DIR}"/*.vtt "${OUT_DIR}"/*.txt "${OUT_DIR}"/*.lrc)
          if [[ "${{ steps.detect.outputs.mode }}" == "whisper" ]]; then
            echo "need_whisper=true" >> "$GITHUB_OUTPUT"
          elif (( ${#files[@]} == 0 )); then
            echo "need_whisper=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_whisper=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download audio for Whisper
        if: steps.postcheck.outputs.need_whisper == 'true'
        env:
          URL: ${{ inputs.url }}
          UA: ${{ inputs.user_agent }}
        shell: bash
        run: |
          set -euo pipefail
          UA_ARGS=()
          if [[ -n "${UA}" ]]; then UA_ARGS=(--user-agent "${UA}"); fi
          COOKIE_ARGS=()
          if [[ -f cookies.txt ]]; then COOKIE_ARGS=(--cookies cookies.txt); fi

          yt-dlp \
            --js-runtimes node --remote-components ejs:github \
            -f "bestaudio/best" \
            -o "work/%(id)s.%(ext)s" \
            "${URL}" \
            "${COOKIE_ARGS[@]}" \
            "${UA_ARGS[@]}"

      - name: Whisper generate subtitles (SRT+TXT+VTT) into per-video folder
        if: steps.postcheck.outputs.need_whisper == 'true'
        env:
          MODEL: ${{ inputs.whisper_model }}
          WHISPER_LANG: ${{ inputs.whisper_language }}
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          set -euo pipefail
          AUDIO_FILE="$(ls -1 work/* | head -n 1)"

          LANG_ARGS=()
          if [[ -n "${WHISPER_LANG}" ]]; then LANG_ARGS=(--language "${WHISPER_LANG}"); fi

          whisper "${AUDIO_FILE}" \
            --model "${MODEL}" \
            --output_dir "${OUT_DIR}" \
            --output_format "all" \
            "${LANG_ARGS[@]}"

      - name: Convert SRT -> LRC (simple)
        if: steps.postcheck.outputs.need_whisper == 'true'
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          python - <<'PY'
          import glob, os, re
          out_dir = os.environ["OUT_DIR"]

          def srt_time_to_lrc(t):
            hh, mm, rest = t.split(":")
            ss, ms = rest.split(",")
            total_mm = int(hh)*60 + int(mm)
            xx = int(ms)//10
            return f"{total_mm:02d}:{int(ss):02d}.{xx:02d}"

          for srt in glob.glob(os.path.join(out_dir, "*.srt")):
            with open(srt, "r", encoding="utf-8", errors="ignore") as f:
              lines = [x.rstrip("\n") for x in f]

            out = []
            i = 0
            while i < len(lines):
              if re.fullmatch(r"\d+", (lines[i].strip() or "")):
                i += 1
                if i < len(lines) and "-->" in lines[i]:
                  time_line = lines[i]
                  i += 1
                  text = []
                  while i < len(lines) and lines[i].strip() != "":
                    text.append(lines[i].strip())
                    i += 1
                  start = time_line.split("-->")[0].strip()
                  if text:
                    out.append(f"[{srt_time_to_lrc(start)}] " + " ".join(text))
              i += 1

            lrc = os.path.splitext(srt)[0] + ".lrc"
            with open(lrc, "w", encoding="utf-8") as f:
              f.write("\n".join(out).strip() + ("\n" if out else ""))
          PY

      - name: Extract plain text subtitles (no timestamps)
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          python - <<'PY'
          import glob, os, re

          out_dir = os.environ["OUT_DIR"]

          for srt_path in sorted(glob.glob(os.path.join(out_dir, "*.srt"))):
            txt_path = os.path.splitext(srt_path)[0] + ".txt"

            # Whisper 路径已生成 .txt，跳过避免覆盖
            if os.path.exists(txt_path):
              print(f"已存在，跳过: {os.path.basename(txt_path)}")
              continue

            with open(srt_path, "r", encoding="utf-8", errors="ignore") as f:
              content = f.read()

            blocks = re.split(r"\n\s*\n", content.strip())
            text_lines = []
            for block in blocks:
              for line in block.strip().splitlines():
                line = line.strip()
                if not line:
                  continue
                if re.fullmatch(r"\d+", line):
                  continue
                if re.match(r"\d{2}:\d{2}:\d{2},\d{3}\s*-->", line):
                  continue
                text_lines.append(line)

            with open(txt_path, "w", encoding="utf-8") as f:
              f.write("\n".join(text_lines) + "\n")

            print(f"✓ 生成: {os.path.basename(txt_path)} ({len(text_lines)} 行)")

          print("纯文本提取完成！")
          PY

      - name: Commit & push subtitles
        env:
          URL: ${{ inputs.url }}
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
          VIDEO_ID: ${{ steps.detect.outputs.video_id }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain subs)" ]]; then
            echo "No changes under subs/. Skip commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add subs
          git commit -m "Add subtitles: ${VIDEO_ID} (${URL})" || exit 0
          git push

      # ★ 同时拆分 .lrc 和 .txt，超过4万字符则分片
      - name: Split large subtitle files (LRC + TXT, if > 40k chars)
        env:
          OUT_DIR: ${{ steps.detect.outputs.out_dir }}
        shell: bash
        run: |
          python - <<'PY'
          import glob, os, re
          from pathlib import Path

          out_dir = os.environ["OUT_DIR"]
          MAX_CHARS = 40000

          # ── LRC 工具函数 ──────────────────────────────────────────
          def lrc_text_only(content):
            """提取LRC纯文本字符（去掉时间戳）"""
            text = []
            for line in content.strip().splitlines():
              m = re.match(r"\[(\d+):(\d+\.\d+)\]\s*(.*)", line)
              if m:
                text.append(m.group(3))
            return "".join(text)

          def split_lrc(lines, max_chars):
            chunks, cur, cur_len = [], [], 0
            for line in lines:
              m = re.match(r"\[(\d+):(\d+\.\d+)\]\s*(.*)", line.strip())
              if m:
                tlen = len(m.group(3))
                if cur_len + tlen > max_chars and cur:
                  chunks.append(cur); cur = [line]; cur_len = tlen
                else:
                  cur.append(line); cur_len += tlen
              else:
                if cur:
                  cur.append(line)
            if cur:
              chunks.append(cur)
            return chunks

          # ── TXT 工具函数 ──────────────────────────────────────────
          def split_txt(lines, max_chars):
            """按行边界拆分，不截断单行"""
            chunks, cur, cur_len = [], [], 0
            for line in lines:
              line_len = len(line)
              if cur_len + line_len + 1 > max_chars and cur:
                chunks.append(cur); cur = [line]; cur_len = line_len
              else:
                cur.append(line); cur_len += line_len + 1  # +1 代表换行符
            if cur:
              chunks.append(cur)
            return chunks

          # ── 通用拆分入口 ──────────────────────────────────────────
          def process_file(fpath, count_fn, split_fn, subdir_name):
            with open(fpath, "r", encoding="utf-8", errors="ignore") as f:
              content = f.read()

            char_count = count_fn(content)
            fname = os.path.basename(fpath)
            print(f"检查: {fname}  ({char_count} 字符)")

            if char_count <= MAX_CHARS:
              print(f"  ✓ 无需拆分")
              return

            print(f"  ⚠️  超过 {MAX_CHARS} 字符，开始拆分...")
            chunks_dir = Path(out_dir) / subdir_name
            chunks_dir.mkdir(exist_ok=True)

            lines = [l.rstrip("\n") for l in content.split("\n")]
            chunks = split_fn(lines, MAX_CHARS)
            base = os.path.splitext(fname)[0]
            ext  = os.path.splitext(fname)[1]

            for idx, chunk_lines in enumerate(chunks, 1):
              chunk_name = f"{base}_part{idx}{ext}"
              chunk_path = chunks_dir / chunk_name
              with open(chunk_path, "w", encoding="utf-8") as f:
                f.write("\n".join(chunk_lines))
                if chunk_lines and not chunk_lines[-1].endswith("\n"):
                  f.write("\n")
              chunk_chars = count_fn("\n".join(chunk_lines))
              print(f"  ✓ {chunk_name}  ({chunk_chars} 字符)")

            print(f"  完成，共 {len(chunks)} 个分片")

          # ── 处理 LRC ─────────────────────────────────────────────
          print("=== 处理 LRC 文件 ===")
          for fp in sorted(glob.glob(os.path.join(out_dir, "*.lrc"))):
            process_file(fp, lrc_text_only, split_lrc, "lrc_chunks")

          # ── 处理 TXT ─────────────────────────────────────────────
          print("\n=== 处理 TXT 文件 ===")
          skip_names = {"source_url.txt"}   # 溯源文件不拆
          for fp in sorted(glob.glob(os.path.join(out_dir, "*.txt"))):
            if os.path.basename(fp) in skip_names:
              continue
            # count_fn 对 TXT 直接数全文字符
            process_file(fp, lambda c: len(c), split_txt, "txt_chunks")

          print("\n所有文件处理完成！")
          PY
